data_path: /home/gloc/G-LOC-Prediction/data
shared_data_parameters:
  subject_to_analyze: null
  trial_to_analyze: null
  analysis_type: 2
  remove_NaN_trials: true
  impute_file_name: imputed_data.pkl
  save_impute: false
  load_impute: false
  should_impute: true
advanced_data_parameters:
  n_neighbors: 4
  baseline_window: 32.5
traditional_data_parameters:
  backstep: 0
  data_rate: 25
  offset: 0
  time_start: 0
sensor_ablation:
  training:
    enabled: false
    save_results_folder: Results/Sensor_Ablation
    median_hyperparameters_folder: ModelSave/CV
    # Mode-specific parameters
    models: [EGB, KNN]
    model_type: [Complete, Explicit]
    random_seed: 42
    num_splits: 10
    streams:
      - [ECG, HR, BR, Temperature]
      - [EEG]
  review:
    enabled: false
    save_results_folder: Results/Sensor_Ablation
    # Mode-specific parameters for review
    models: [KNN, EGB]
    model_type: [Complete, Explicit]
    stream_group: [EEG]
    sort_streams_by_median: true

feature_space_review:
  enabled: false
  # Mode-specific parameters
  models: [KNN, EGB, RF]
  model_type: [Complete, Explicit]

cross_validation:
  enabled: true
  # Mode-specific parameters
  models: [Trans]
  model_type: [Complete, Explicit]
  random_seed: 42
  num_splits: 10
  save_results_folder: Results/CrossValidation
  class_weight: null
  support_deep_learning: false
  save_median_hyperparameters: true
  impute_handling: {}

  advanced_hpo:
    # Advanced classifiers only: REQUIRED when using any advanced model (LSTM, TCN, Trans, NAM, LogRegTS)
    # These control Optuna tuning and final training behavior. Provide all fields exactly.
    use_sampler: true            # bool: whether to use a sampler for class imbalance during training
    final_early_stop: false      # bool: whether final training should use early stopping
    objective_var: F1            # string: 'F1' or 'Acc' (case-insensitive)
    trials: 100                  # int: number of Optuna trials (maps to n_trials)
    train_fraction: 0.8          # float: fraction of training data used for subtrain in HPO
    timeout: null                # int|null: Optuna timeout in seconds (null to disable)
    sampler_seed: 42             # int|null: seed for HPO sampler
    pruner_startup_trials: 3     # int: MedianPruner n_startup_trials
    pruner_warmup_steps: 0       # int: MedianPruner n_warmup_steps