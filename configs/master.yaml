data_path: /home/gloc/G-LOC-Prediction/data/
runtime:
  device: auto  # Alienware: use cuda; local development: use auto
  require_gpu: false
  enable_cuml: true
  timing_output: Results/run_timing.json
shared_data_parameters:
  subject_to_analyze: null
  trial_to_analyze: null
  analysis_type: 2
  remove_NaN_trials: true
  impute_file_name: imputed_data.pkl
  save_impute: false
  load_impute: false
  impute_phase: pre_feature
  output_feature_dtype: float32
advanced_data_parameters:
  n_neighbors: 4
  baseline_window: 32.5
  horizon: 0
traditional_data_parameters:
  backstep: 0
  data_rate: 25
  offset: 0
  time_start: 0

cross_validation:
  enabled: true
  # Mode-specific parameters
  models: [ KNN, EGB ]
  model_type: !ModelType [ Complete, Explicit ]
  random_seed: 42
  num_splits: 10
  save_results_folder: Results/Cross_Validation
  class_weight: null
  traditional_hpo:
    n_iter: 30
    cv: 3
    n_jobs: 1
    scoring: f1
  advanced_hpo:
    use_sampler: true
    final_early_stop: false
    objective_var: F1
    trials: 100

sensor_ablation:
  training:
    enabled: true
    save_results_folder: Results/Sensor_Ablation
    median_hyperparameters_folder: Results/Cross_Validation
    # Mode-specific parameters
    models: [ KNN, EGB ]
    model_type: !ModelType [ Complete, Explicit ]
    random_seed: 42
    num_splits: 10
    streams:
      - [ EEG ]
      - [ EEG, Pupil ]
      - [ EEG, Pupil, Participant ]
  review:
    enabled: True
    save_results_folder: Results/Sensor_Ablation
    # Mode-specific parameters for review
    models: [ KNN, EGB ]
    model_type: !ModelType [ Complete, Explicit ]
    stream_groups:
      - [ EEG ]
      - [ EEG, Pupil ]
      - [ EEG, Pupil, Participant ]
    sort_streams_by_median: true

feature_space_review:
  enabled: true
  # Mode-specific parameters
  models: [ KNN, EGB ]
  model_type: !ModelType [ Complete, Explicit ]
  median_hyperparameters_folder: Results/Cross_Validation
