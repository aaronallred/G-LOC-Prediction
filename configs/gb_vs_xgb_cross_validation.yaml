data_path: data/
main_data_file: all_trials_25_hz_stacked_null_str_filled_reduced.csv
shared_data_parameters:
  subject_to_analyze: null
  trial_to_analyze: null
  analysis_type: 2
  remove_NaN_trials: true
  impute_file_name: imputed_data.pkl
  save_impute: false
  load_impute: false
  impute_phase: pre_feature
  output_feature_dtype: float32
advanced_data_parameters:
  n_neighbors: 4
  baseline_window: 32.5
  horizon: 0
traditional_data_parameters:
  backstep: 0
  data_rate: 25
  offset: 0
  time_start: 0

cross_validation:
  enabled: true
  models: [ EGB, XGB ]
  model_type: !ModelType [ Complete, Explicit ]
  random_seed: 42
  num_splits: 2
  save_results_folder: Results/Cross_Validation_GB_vs_XGB
  class_weight: null
  advanced_hpo:
    use_sampler: true
    final_early_stop: false
    objective_var: F1
    trials: 100
