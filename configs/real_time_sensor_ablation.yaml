data_path: data
shared_data_parameters:
  subject_to_analyze: null
  trial_to_analyze: null
  analysis_type: 2
  remove_NaN_trials: true
  impute_file_name: imputed_data.pkl
  save_impute: false
  load_impute: false
  impute_phase: pre_feature
  output_feature_dtype: float32
advanced_data_parameters:
  n_neighbors: 4
  baseline_window: 32.5
  horizon: 0
traditional_data_parameters:
  backstep: 0
  data_rate: 25
  offset: 0
  time_start: 0

sensor_ablation:
  training:
    enabled: true
    save_results_folder: Results/Sensor_Ablation_Real_Time
    median_hyperparameters_folder: Results/Cross_Validation
    models: [ EGB, KNN, RF ]
    model_type: !ModelType [ Complete, Explicit ]
    manual_ablation: true
    random_seed: 42
    num_splits: 10
    class_weight: null
    streams:
      - [ ECG, Centrifuge ]
  review:
    enabled: false
    save_results_folder: Results/Sensor_Ablation_Real_Time
    models: [ EGB, KNN, RF ]
    model_type: !ModelType [ Complete, Explicit ]
    stream_groups:
      - [ ECG, Centrifuge ]
    sort_streams_by_median: true