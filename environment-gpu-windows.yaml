name: gloc
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - cupy
  - numpy
  - pandas
  - scikit-learn
  - imbalanced-learn
  - scikit-optimize
  - faiss-cpu=1.14.3
  - matplotlib
  - matplotlib-venn
  - seaborn
  - shap
  - optuna
  - pytest
  - ipykernel
  - openpyxl
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu132
      - torch
      - torchvision
      - PyQt6==6.11.0
      - UpSetPlot==0.9.0
      - munkres==1.1.4
      - unicodedata2==17.0.1